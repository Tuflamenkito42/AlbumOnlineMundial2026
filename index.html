<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1222" />
    <title>Mundial Cartas 2026</title>
    <meta
      name="description"
      content="Álbum digital para controlar cartas y pegatinas del Mundial 2026 en iOS y Android."
    />
    <style>
      /* Prevent flash of wrong theme by setting theme early */
      :root {
        color-scheme: light;
      }
      
      :root.dark {
        color-scheme: dark;
      }
    </style>
    <script>
      (function() {
        const themeKey = 'mundial-cartas-2026-theme';
        try {
          const saved = localStorage.getItem(themeKey);
          if (saved === 'true') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage no disponible, ignorar
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
